components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >-
        HS256 access JWT issued by the auth service. Send as the HTTP Authorization header
        value `Bearer` followed by a space and the token.

  parameters:
    CourseId:
      name: courseId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SlotId:
      name: slotId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SessionId:
      name: sessionID
      in: path
      required: true
      schema:
        type: string
        format: uuid
    MatchRequestId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    GroupId:
      name: groupID
      in: path
      required: true
      schema:
        type: string
        format: uuid
    GroupMemberUserId:
      name: userID
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ReviewsUserId:
      name: userID
      in: path
      required: true
      schema:
        type: string
    PointsUserId:
      name: userID
      in: path
      required: true
      schema:
        type: string

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Human-readable message (see `httputil.ErrBody`)

    PointsReason:
      # Request JSON field is `reason` (handler `postPointsEventRequest.reason`); maps to `domain.Reason` / `point_transactions.reason`.
      type: string
      description: Point transaction reason (`domain.Reason` / `point_transactions.reason` in code).
      enum:
        - review_left
        - review_received
        - group_created
        - group_activity
        - session_confirmed
        - match_accepted

    RegisterRequest:
      type: object
      required: [email, password, firstName, lastName]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        firstName:
          type: string
        lastName:
          type: string

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer
          format: int64
          description: Seconds until access token expiry (computed server-side)

    RefreshAccessResponse:
      type: object
      properties:
        accessToken:
          type: string
        expiresIn:
          type: integer
          format: int64

    UserProfileResponse:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        bio:
