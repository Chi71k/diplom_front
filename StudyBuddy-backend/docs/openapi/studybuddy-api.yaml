        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MatchResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Match already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
    get:
      summary: List match requests for the current user
      tags: [matching]
      operationId: listMatchRequests
      security:
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
          description: >
            When non-empty, filters to this status string (see `domain.MatchStatus` values such as
            pending, accepted, declined, canceled). Omit or leave empty to list all statuses.
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
          description: Default 20 when omitted or invalid.
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
          description: Default 0 when omitted or invalid.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MatchListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
