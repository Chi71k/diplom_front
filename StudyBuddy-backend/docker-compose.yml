# StudyBuddy backend - local development
# Usage: docker compose up -d
# Then run services locally (go run ./cmd/...) or in IDE

services:
  postgres:
    image: postgres:16-alpine
    container_name: studybuddy-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-studybuddy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-studybuddy}
      POSTGRES_DB: ${POSTGRES_DB:-studybuddy}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-studybuddy} -d ${POSTGRES_DB:-studybuddy}"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth:
    image: golang:1.24-alpine
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "go run ./cmd/auth"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://studybuddy:studybuddy@postgres:5432/studybuddy?sslmode=disable}
      AUTH_SERVER_PORT: ${AUTH_SERVER_PORT:-8080}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${AUTH_SERVER_PORT:-8080}:8080"

  users:
    image: golang:1.24-alpine
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "go run ./cmd/users"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://studybuddy:studybuddy@postgres:5432/studybuddy?sslmode=disable}
      USERS_SERVER_PORT: ${USERS_SERVER_PORT:-8081}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${USERS_SERVER_PORT:-8081}:8081"

  courses:
    image: golang:1.24-alpine
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "go run ./cmd/courses"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://studybuddy:studybuddy@postgres:5432/studybuddy?sslmode=disable}
      COURSES_SERVER_PORT: ${COURSES_SERVER_PORT:-8082}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${COURSES_SERVER_PORT:-8082}:8082"

  availability:
    image: golang:1.24-alpine
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "go run ./cmd/availability"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://studybuddy:studybuddy@postgres:5432/studybuddy?sslmode=disable}
      AVAILABILITY_SERVER_PORT: ${AVAILABILITY_SERVER_PORT:-8083}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      POINTS_SERVICE_URL: ${POINTS_SERVICE_URL:-http://points:8087}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${AVAILABILITY_SERVER_PORT:-8083}:8083"

  matching:
    image: golang:1.24-alpine
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "go run ./cmd/matching"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://studybuddy:studybuddy@postgres:5432/studybuddy?sslmode=disable}
      MATCHING_SERVER_PORT: ${MATCHING_SERVER_PORT:-8084}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      REVIEWS_SERVICE_URL: ${REVIEWS_SERVICE_URL:-http://reviews:8086}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${MATCHING_SERVER_PORT:-8084}:8084"

  groups:
    image: golang:1.24-alpine
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "go run ./cmd/groups"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://studybuddy:studybuddy@postgres:5432/studybuddy?sslmode=disable}
      GROUPS_SERVER_PORT: ${GROUPS_SERVER_PORT:-8085}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      POINTS_SERVICE_URL: ${POINTS_SERVICE_URL:-http://points:8087}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${GROUPS_SERVER_PORT:-8085}:8085"

  reviews:
    image: golang:1.24-alpine
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "go run ./cmd/reviews"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://studybuddy:studybuddy@postgres:5432/studybuddy?sslmode=disable}
      REVIEWS_SERVER_PORT: ${REVIEWS_SERVER_PORT:-8086}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      JWT_ISSUER: ${JWT_ISSUER:-studybuddy-auth}
      POINTS_SERVICE_URL: ${POINTS_SERVICE_URL:-http://points:8087}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${REVIEWS_SERVER_PORT:-8086}:8086"

  points:
    image: golang:1.24-alpine
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "go run ./cmd/points"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://studybuddy:studybuddy@postgres:5432/studybuddy?sslmode=disable}
      POINTS_SERVER_PORT: ${POINTS_SERVER_PORT:-8087}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      JWT_ISSUER: ${JWT_ISSUER:-studybuddy-auth}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      REVIEWS_SERVICE_URL: ${REVIEWS_SERVICE_URL:-http://reviews:8086}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${POINTS_SERVER_PORT:-8087}:8087"


volumes:
  postgres_data:
