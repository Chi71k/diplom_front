name: OpenAPI lint
on:
  push:
    paths:
      - 'docs/openapi/**.yaml'
      - 'docs/openapi/**.yml'
  pull_request:
    paths:
      - 'docs/openapi/**.yaml'
      - 'docs/openapi/**.yml'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint OpenAPI spec
        run: npx --yes @redocly/cli lint docs/openapi/studybuddy-api.yaml
